# 运行时动态生成的 Tool 配置文件
# 生成时间: 20260204_033617
# 配置选项:
#   - use_strict_format_check: false
#   - use_length_reward: true
#   - length_reward_weight: 0.2
#   - length_reward_config: [10, 15, 25, 50]

tools:
  - class_name: "psy_r1.verl.tools.patient_interaction_tools.AskPatientTool"
    config:
      type: native
      patient_agent_url: "http://192.168.5.188:8001"
      default_patient_version: "v3"
      default_model_name: "Qwen3-32B"
      timeout: 120
      max_history: 15
      log_payload: false
      log_messages: false
      log_complete_dialogue: true
      max_retries: 3
      retry_delay: 2.0
      retry_backoff: 1.5
    tool_schema:
      type: "function"
      function:
        name: "ask_patient"
        description: "向本地 Patient Agent 提问并获取回答。"
        parameters:
          type: "object"
          properties:
            question:
              type: "string"
              description: "需要向患者提出的问题。"
            patient_id:
              type: "string"
              description: "可选，覆盖默认患者 ID。"
            patient_version:
              type: "string"
              description: "可选，覆盖患者版本（默认 v3）。"
            model_name:
              type: "string"
              description: "可选，Patient Agent 使用的底模名称。"
          required: ["question"]

  - class_name: "psy_r1.verl.tools.patient_interaction_tools.DiagnoseRewardTool"
    config:
      type: native
      default_patient_version: "v3"
      log_complete_dialogue: true
      # 格式检查配置
      use_strict_format_check: false
      # 长度奖励配置
      use_length_reward: true
      length_reward_weight: 0.2
      length_reward_config:
        min_turns: 10
        optimal_start: 15
        optimal_end: 25
        max_turns: 50
    tool_schema:
      type: "function"
      function:
        name: "do_diagnose"
        description: "提交最终 ICD-10 诊断并计算奖励。必须在 diagnosis 参数中提供完整的诊断推理过程和 ICD 代码。"
        parameters:
          type: "object"
          properties:
            diagnosis:
              type: "string"
              description: "完整的诊断文本，必须包含：1) <think>诊断推理过程</think> 2) <box>ICD-10代码</box>。例如：<think>患者表现为持续情绪低落...</think> <box>F32.1</box>"
            patient_id:
              type: "string"
              description: "可选，覆盖患者 ID。"
            patient_version:
              type: "string"
              description: "可选，覆盖患者版本。"
          required: ["diagnosis"]
