hydra:
  searchpath:
    - file://psy_r1/verl/trainer/config

defaults:
  - ppo_trainer_psy
  - _self_

data:
  gen_batch_size: ${data.train_batch_size}

reward_model:
  reward_manager: dapo
  overlong_buffer: 
    enable: False # We try to avoid forgetting to set enable
    len: 0
    penalty_factor: 0.0
    log: False

  # Whether to enable symptom identification reward (default: False for backward compatibility)
  use_symptom_reward: False

  # Whether to show training examples
  show_training_examples: False

  # Whether to show validation examples
  show_val_examples: False

algorithm:
  filter_groups:
    _target_: verl.trainer.config.FilterGroupsConfig
    enable: False # We try to avoid forgetting to set enable
    metric: null # acc / score / seq_reward / seq_final_reward / ...
    max_num_gen_batches: 0 # Non-positive values mean no upper limit

trainer:
  project_name: verl-dapo
